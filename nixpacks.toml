# nixpacks.toml — PawRoute V2.0 monorepo build config for Railway
# Nixpacks reads this from the repo root so it has access to ALL workspace packages.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @pawroute/api run build"]

[start]
cmd = "node apps/api/dist/server.js"
