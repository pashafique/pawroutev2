# nixpacks.toml — PawRoute V2.0 monorepo build config for Railway
# pnpm installed via Nix (not npm) so it's in PATH for all subsequent layers.

[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
# Build all dependency packages first, then generate prisma client and build api
cmds = [
  "pnpm --filter @pawroute/config build",
  "pnpm --filter @pawroute/types build",
  "pnpm --filter @pawroute/utils build",
  "pnpm --filter @pawroute/api exec prisma generate",
  "pnpm --filter @pawroute/api run build"
]

[start]
cmd = "node apps/api/dist/server.js"
