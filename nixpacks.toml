# nixpacks.toml — PawRoute V2.0 monorepo build config for Railway
# pnpm installed via Nix (not npm) so it's in PATH for all subsequent layers.

[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
# turbo respects "dependsOn": ["^build"] — builds config/types/utils before api
cmds = ["pnpm turbo build --filter=@pawroute/api"]

[start]
cmd = "node apps/api/dist/server.js"
