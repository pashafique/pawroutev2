version: '3.9'

# Local development environment — mirrors Supabase (PostgreSQL) and Upstash (Redis)
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: pawroute_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pawroute
      POSTGRES_PASSWORD: pawroute_dev
      POSTGRES_DB: pawroute
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pawroute']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pawroute_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pawroute_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pawroute.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    profiles:
      - tools  # Only starts with: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data:
