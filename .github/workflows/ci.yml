name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter=@pawroute/api run db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Type check all packages
        run: pnpm type-check

      - name: Lint all packages
        run: pnpm lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pawroute
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pawroute_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pawroute:test@localhost:5432/pawroute_test
      UPSTASH_REDIS_REST_URL: http://localhost:6379
      UPSTASH_REDIS_REST_TOKEN: test
      JWT_ACCESS_SECRET: test_access_secret_that_is_at_least_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_that_is_at_least_32_chars_long
      JWT_ADMIN_SECRET: test_admin_secret_that_is_at_least_32_chars_long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter=@pawroute/api run db:generate

      - name: Run database migrations
        run: pnpm --filter=@pawroute/api run db:migrate:deploy

      - name: Run tests
        run: pnpm test

  security:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-extended

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Audit dependencies (npm audit)
        run: pnpm audit --audit-level=high
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter=@pawroute/api run db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build all apps
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://api.pawroute.com
          NEXT_PUBLIC_WEB_URL: https://pawroute.com
          NEXT_PUBLIC_ADMIN_URL: https://admin.pawroute.com
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
